spring:
  application:
    name: benchmark
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/benchmark}
    username: ${DB_USERNAME:benchmark}
    password: ${DB_PASSWORD:benchmark}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  thymeleaf:
    cache: false
  config:
    import: optional:file:.env[.properties]

logging:
  level:
    org.hibernate.SQL: ${LOG_SQL:debug}

scheduler:
  hacker-news:
    enabled: ${HACKER_NEWS_SCHEDULER_ENABLED:true}
    cron: ${HACKER_NEWS_SCHEDULER_CRON:0 0 9 * * *}
    zone: ${HACKER_NEWS_SCHEDULER_ZONE:Asia/Seoul}
