<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenchMark</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="page">
    <header class="hero">
        <p class="eyebrow">BenchMark</p>
        <h1>Developer community AI trend dashboard</h1>
        <p class="hero-copy" th:text="${currentWeek + ' 기준 언급량과 최근 게시글을 한 화면에서 확인합니다.'}"></p>
        <div class="hero-actions">
            <a class="nav-link" th:href="@{/admin/main}">Admin</a>
        </div>
    </header>

    <section>
        <div class="section-head">
            <h2>Automatic Collection</h2>
            <span class="section-note" th:text="${schedulerEnabled ? 'scheduler on' : 'scheduler off'}"></span>
        </div>
        <p class="section-copy">Hacker News 수집은 지정한 스케줄에 따라 자동 실행됩니다.</p>
        <p class="action-status">실행 시간: <strong th:text="${schedulerCron}"></strong> <span th:text="${schedulerZone}"></span></p>
    </section>

    <section>
        <div class="section-head">
            <h2>This Week</h2>
            <span class="section-note" th:text="${currentWeek}"></span>
        </div>
        <ul id="summary-list" class="summary-list" th:attr="hidden=${#lists.isEmpty(summary)} ? 'hidden' : null">
            <li class="summary-item" th:each="item : ${summary}">
                <strong th:text="${item.modelName}"></strong>
                <span th:text="${item.mentionCount + ' mentions'}"></span>
                <span th:text="${#numbers.formatDecimal(item.growthRate, 1, 1) + '% vs prev'}"></span>
            </li>
        </ul>
        <p id="summary-empty" class="empty-state" th:attr="hidden=${!#lists.isEmpty(summary)} ? 'hidden' : null">이번 주 집계 데이터가 아직 없습니다.</p>
    </section>

    <section>
        <div class="section-head">
            <h2>Recent Articles</h2>
            <div class="section-actions">
                <span class="section-note">top 5</span>
                <label class="sort-control" for="article-sort">
                    <span class="sort-label">Sort</span>
                    <select id="article-sort" name="articleSort">
                        <option value="latest" th:selected="${articleSort == 'latest'}">Latest</option>
                        <option value="score" th:selected="${articleSort == 'score'}">Top Score</option>
                    </select>
                </label>
            </div>
        </div>
        <div id="article-list" class="article-list" th:attr="hidden=${#lists.isEmpty(recentArticles)} ? 'hidden' : null">
            <article class="article-card" th:each="article : ${recentArticles}">
                <div class="article-meta">
                    <span class="source" th:text="${article.source}"></span>
                    <span th:text="${'score ' + article.score}"></span>
                    <span th:text="${'comments ' + article.commentCount}"></span>
                </div>
                <h3>
                    <a th:href="${article.url}" th:text="${article.title}" target="_blank" rel="noopener noreferrer"></a>
                </h3>
                <p class="article-time"
                   th:text="${article.collectedAt != null ? #temporals.format(article.collectedAt, 'yyyy-MM-dd HH:mm') + ' collected' : 'collection time unavailable'}"></p>
            </article>
        </div>
        <p id="article-empty" class="empty-state" th:attr="hidden=${!#lists.isEmpty(recentArticles)} ? 'hidden' : null">최근 게시글 데이터가 아직 없습니다.</p>
    </section>
</main>
<script>
    const articleList = document.getElementById('article-list');
    const articleEmpty = document.getElementById('article-empty');
    const articleSortSelect = document.getElementById('article-sort');
    const currentArticleSort = new URLSearchParams(window.location.search).get('articleSort') ?? 'latest';

    articleSortSelect.value = currentArticleSort;

    articleSortSelect.addEventListener('change', async () => {
        const nextSort = articleSortSelect.value;
        syncArticleSortInUrl(nextSort);
        await refreshArticles(nextSort);
    });

    async function refreshArticles(sort) {
        articleSortSelect.disabled = true;

        try {
            const response = await fetch(`/api/articles?sort=${encodeURIComponent(sort)}`);
            const articles = await response.json();

            if (!response.ok) {
                throw new Error(JSON.stringify(articles, null, 2));
            }

            renderArticles(articles);
        } finally {
            articleSortSelect.disabled = false;
        }
    }

    function syncArticleSortInUrl(sort) {
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set('articleSort', sort);
        window.history.replaceState({}, '', nextUrl);
    }

    function renderArticles(articles) {
        articleList.innerHTML = '';

        if (!articles || articles.length === 0) {
            toggleCollectionState(articleList, articleEmpty, false);
            return;
        }

        for (const article of articles) {
            const articleCard = document.createElement('article');
            articleCard.className = 'article-card';
            articleCard.innerHTML = `
                <div class="article-meta">
                    <span class="source">${escapeHtml(article.source)}</span>
                    <span>score ${article.score}</span>
                    <span>comments ${article.commentCount}</span>
                </div>
                <h3>
                    <a href="${escapeAttribute(article.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(article.title)}</a>
                </h3>
                <p class="article-time">${formatCollectedAt(article.collectedAt)}</p>
            `;
            articleList.appendChild(articleCard);
        }

        toggleCollectionState(articleList, articleEmpty, true);
    }

    function toggleCollectionState(listElement, emptyElement, hasItems) {
        listElement.hidden = !hasItems;
        emptyElement.hidden = hasItems;
    }

    function formatCollectedAt(value) {
        if (!value) {
            return 'collection time unavailable';
        }

        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
            return 'collection time unavailable';
        }

        const formatted = new Intl.DateTimeFormat('ko-KR', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
        }).format(date);

        return `${formatted} collected`;
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function escapeAttribute(value) {
        return escapeHtml(value);
    }
</script>
</body>
</html>
